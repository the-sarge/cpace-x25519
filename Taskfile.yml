# Taskfile.yml - cpace validation targets
#
# Local gate:
#   task check
#
# Fuzzing:
#   task fuzz FUZZTIME=30s PARALLEL=2

version: "3"

output: group

vars:
  GOVULNCHECK: '{{.GOVULNCHECK | default "govulncheck"}}'
  STATICCHECK: '{{.STATICCHECK | default "staticcheck"}}'
  FUZZTIME: '{{.FUZZTIME | default "30s"}}'

tasks:
  default:
    cmds:
      - task: check

  test:
    desc: Run the normal test suite
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  lint:
    desc: Run Go vet and staticcheck
    cmds:
      - go vet ./...
      - "{{.STATICCHECK}} ./..."

  vuln:
    desc: Run govulncheck
    cmds:
      - "{{.GOVULNCHECK}} ./..."

  check:
    desc: Full local validation gate
    cmds:
      - task: test
      - task: test:race
      - task: lint
      - task: vuln

  fuzz:
    desc: Run every fuzz target in .github/fuzz-targets.json
    cmds:
      - |
        set -euo pipefail
        command -v jq >/dev/null 2>&1 || {
          echo "jq not found; install jq to run task fuzz"
          exit 1
        }

        fuzztime="{{.FUZZTIME}}"
        case "$fuzztime" in
          ""|0|0s|0m|0h|-*)
            echo "FUZZTIME must be a positive Go duration (got: '$fuzztime')"
            exit 1
            ;;
        esac

        parallel="${PARALLEL:-}"
        if [ -z "$parallel" ]; then
          ncores="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)"
          parallel=$(( ncores / 2 ))
          if [ "$parallel" -lt 1 ]; then
            parallel=1
          fi
        fi
        case "$parallel" in
          ''|*[!0-9]*|0*)
            echo "PARALLEL must be a positive integer (got: '$parallel')"
            exit 1
            ;;
        esac

        target_count="$(jq 'length' .github/fuzz-targets.json)"
        if [ "$target_count" -lt 1 ]; then
          echo ".github/fuzz-targets.json contains no targets"
          exit 1
        fi

        echo "Running $target_count fuzz targets (PARALLEL=$parallel, FUZZTIME=$fuzztime)"
        log_dir="$(mktemp -d)"
        trap 'rm -rf "$log_dir"' EXIT

        jq -r '.[] | "\(.target)|\(.package)"' .github/fuzz-targets.json | \
          xargs -P "$parallel" -I{} bash -c '
            entry="$1"
            dir="$2"
            target="${entry%%|*}"
            pkg="${entry#*|}"
            if out=$(go test -race -fuzz="$target" -fuzztime="$FUZZTIME" "$pkg" 2>&1); then
              printf "=== PASS: %s ===\n" "$target" > "$dir/$target.log"
            else
              printf "=== FAIL: %s (%s) ===\n%s\n" "$target" "$pkg" "$out" > "$dir/$target.log"
              : > "$dir/$target.fail"
            fi
          ' _ {} "$log_dir"

        for log in "$log_dir"/*.log; do
          [ -f "$log" ] || continue
          cat "$log"
        done
        if ls "$log_dir"/*.fail >/dev/null 2>&1; then
          exit 1
        fi
        echo "All $target_count fuzz targets passed"
    env:
      FUZZTIME: "{{.FUZZTIME}}"

