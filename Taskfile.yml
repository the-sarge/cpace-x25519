# Taskfile.yml - cpace validation targets
#
# Local lanes:
#   task quick
#   task check
#   task check:changed
#   task lint:golangci
#   task bench
#
# Fuzzing:
#   task fuzz FUZZTIME=30s PARALLEL=2
#   FUZZ_RACE=0 GOMAXPROCS=4 FUZZ_TEST_PARALLEL=2 FUZZTIME=8m PARALLEL=2 task fuzz

version: "3"

output: group

vars:
  AST_GREP: '{{.AST_GREP | default "ast-grep"}}'
  CMARK: '{{.CMARK | default "cmark"}}'
  GOSEC: '{{.GOSEC | default "gosec"}}'
  GOFMT: '{{.GOFMT | default "gofmt"}}'
  GOIMPORTS: '{{.GOIMPORTS | default "goimports"}}'
  GOLANGCI_LINT: '{{.GOLANGCI_LINT | default "go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2"}}'
  GOVULNCHECK: '{{.GOVULNCHECK | default "govulncheck"}}'
  STATICCHECK: '{{.STATICCHECK | default "staticcheck"}}'
  FUZZTIME: '{{.FUZZTIME | default "30s"}}'
  BENCH: '{{.BENCH | default "."}}'
  BENCHCOUNT: '{{.BENCHCOUNT | default "1"}}'
  BENCHTIME: '{{.BENCHTIME | default "1s"}}'

tasks:
  default:
    cmds:
      - task: check

  test:
    desc: Run the normal test suite
    cmds:
      - go test ./...

  quick-test:
    desc: Run the lightweight local test lane
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  bench:
    desc: Run benchmarks with allocation metrics
    cmds:
      - go test -run '^$' -bench '{{.BENCH}}' -benchmem -benchtime '{{.BENCHTIME}}' -count '{{.BENCHCOUNT}}' ./...

  lint:
    desc: Run formatting, Go, and structural linters
    cmds:
      - task: lint:gofmt
      - task: lint:goimports
      - task: lint:go
      - task: lint-ast-grep

  lint:gofmt:
    desc: Check gofmt formatting
    cmds:
      - |
        unformatted="$({{.GOFMT}} -l $(git ls-files '*.go'))"
        if [ -n "$unformatted" ]; then
          echo "gofmt check failed. Run gofmt on:"
          echo "$unformatted"
          exit 1
        fi

  lint:goimports:
    desc: Check import formatting
    cmds:
      - |
        command -v {{.GOIMPORTS}} >/dev/null 2>&1 || {
          echo "{{.GOIMPORTS}} not found; install goimports or set GOIMPORTS=/path/to/goimports"
          exit 1
        }
      - |
        unformatted="$({{.GOIMPORTS}} -l $(git ls-files '*.go'))"
        if [ -n "$unformatted" ]; then
          echo "goimports check failed. Run goimports on:"
          echo "$unformatted"
          exit 1
        fi

  lint:go:
    desc: Run Go vet and staticcheck
    cmds:
      - go vet ./...
      - "{{.STATICCHECK}} ./..."

  lint-ast-grep:
    desc: Run ast-grep structural linting rules
    cmds:
      - |
        command -v {{.AST_GREP}} >/dev/null 2>&1 || {
          echo "{{.AST_GREP}} not found; install ast-grep or set AST_GREP=/path/to/ast-grep"
          exit 1
        }
      - "{{.AST_GREP}} scan --error"

  lint:golangci:
    desc: Run curated golangci-lint advisory analyzers
    cmds:
      - "{{.GOLANGCI_LINT}} run"

  docs:check:
    desc: Validate tracked Markdown and whitespace
    cmds:
      - git diff --check
      - |
        md_files="$(git ls-files '*.md')"
        if [ -z "$md_files" ]; then
          exit 0
        fi
        command -v {{.CMARK}} >/dev/null 2>&1 || {
          echo "{{.CMARK}} not found; install cmark or set CMARK=/path/to/cmark"
          exit 1
        }
        {{.CMARK}} --validate-utf8 $md_files >/dev/null

  vuln:
    desc: Run govulncheck
    cmds:
      - "{{.GOVULNCHECK}} -test ./..."

  gosec:
    desc: Run advisory gosec scan
    cmds:
      - "{{.GOSEC}} ./..."

  release:helpers:
    desc: Run release helper script smoke tests
    cmds:
      - scripts/test-release-helpers.sh

  ci:classifier:
    desc: Run CI change classifier tests
    cmds:
      - scripts/test-ci-classifier.sh

  evidence:baseline:
    desc: Validate the pinned evidence baseline index and committed evidence bundles
    cmds:
      - scripts/check-evidence-baseline.sh

  evidence:lint:
    desc: Run lint checks for the evidence baseline checker module
    dir: tools/evidencebaseline
    cmds:
      - go vet ./...
      - "{{.STATICCHECK}} ./..."

  quick:
    desc: Lightweight local iteration lane
    cmds:
      - task: lint:gofmt
      - task: docs:check
      - task: ci:classifier
      - task: quick-test

  check:changed:
    desc: Run docs-only validation when only docs changed, otherwise run quick
    cmds:
      - |
        set -euo pipefail
        base="${BASE_REF:-origin/main}"
        changed_files="$(
          {
            if git rev-parse --verify "$base" >/dev/null 2>&1; then
              git diff --name-only --no-renames "$base"...HEAD
            fi
            git diff --name-only --no-renames
            git diff --cached --name-only --no-renames
            git ls-files --others --exclude-standard
          } | sort -u
        )"

        classification="$(printf '%s\n' "$changed_files" | scripts/classify-check-changes.sh)"
        eval "$classification"

        if [ "$docs_only" = "true" ]; then
          echo "Docs-only changes detected; running docs validation."
          task docs:check
        else
          echo "Code or workflow changes detected; running quick validation."
          task quick
        fi
        if [ "$evidence_changed" = "true" ]; then
          echo "Evidence baseline changes detected; running evidence baseline validation."
          task evidence:baseline
        fi
        if [ "$evidence_checker_changed" = "true" ]; then
          echo "Evidence checker changes detected; running evidence checker lint."
          task evidence:lint
        fi

  check:
    desc: Full local validation gate, including release helper smoke tests
    cmds:
      - task: docs:check
      - task: release:helpers
      - task: ci:classifier
      - task: evidence:baseline
      - task: evidence:lint
      - task: test
      - task: test:race
      - task: lint
      - task: vuln

  fuzz:
    desc: Run every fuzz target in .github/fuzz-targets.json
    cmds:
      - |
        set -euo pipefail
        command -v jq >/dev/null 2>&1 || {
          echo "jq not found; install jq to run task fuzz"
          exit 1
        }

        fuzztime="${FUZZTIME}"
        case "$fuzztime" in
          *[smh])
            fuzztime_value="${fuzztime%?}"
            ;;
          *)
            echo "FUZZTIME must be a positive Go duration (got: '$fuzztime')"
            exit 1
            ;;
        esac
        case "$fuzztime_value" in
          ''|*[!0-9]*)
            echo "FUZZTIME must be a positive Go duration (got: '$fuzztime')"
            exit 1
            ;;
        esac
        case "$fuzztime_value" in
          *[1-9]*) ;;
          *)
            echo "FUZZTIME must be a positive Go duration (got: '$fuzztime')"
            exit 1
            ;;
        esac

        parallel="${PARALLEL:-}"
        if [ -z "$parallel" ]; then
          ncores="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)"
          parallel=$(( ncores / 2 ))
          if [ "$parallel" -lt 1 ]; then
            parallel=1
          fi
        fi
        case "$parallel" in
          ''|*[!0-9]*)
            echo "PARALLEL must be a positive integer (got: '$parallel')"
            exit 1
            ;;
        esac
        case "$parallel" in
          *[1-9]*) ;;
          *)
            echo "PARALLEL must be a positive integer (got: '$parallel')"
            exit 1
            ;;
        esac

        target_count="$(jq 'length' .github/fuzz-targets.json)"
        if [ "$target_count" -lt 1 ]; then
          echo ".github/fuzz-targets.json contains no targets"
          exit 1
        fi

        race="${FUZZ_RACE:-1}"
        case "$race" in
          0|1) ;;
          *)
            echo "FUZZ_RACE must be 0 or 1 (got: '$race')"
            exit 1
            ;;
        esac

        gomaxprocs="${GOMAXPROCS:-}"
        if [ -n "$gomaxprocs" ]; then
          case "$gomaxprocs" in
            ''|*[!0-9]*)
              echo "GOMAXPROCS must be a positive integer (got: '$gomaxprocs')"
              exit 1
              ;;
          esac
          case "$gomaxprocs" in
            *[1-9]*) ;;
            *)
              echo "GOMAXPROCS must be a positive integer (got: '$gomaxprocs')"
              exit 1
              ;;
          esac
          if [ "${#gomaxprocs}" -gt 6 ]; then
            echo "GOMAXPROCS value is too large (got: '$gomaxprocs')"
            exit 1
          fi
        fi

        fuzz_test_parallel="${FUZZ_TEST_PARALLEL:-}"
        if [ -n "$fuzz_test_parallel" ]; then
          case "$fuzz_test_parallel" in
            ''|*[!0-9]*)
              echo "FUZZ_TEST_PARALLEL must be a positive integer (got: '$fuzz_test_parallel')"
              exit 1
              ;;
          esac
          case "$fuzz_test_parallel" in
            *[1-9]*) ;;
            *)
              echo "FUZZ_TEST_PARALLEL must be a positive integer (got: '$fuzz_test_parallel')"
              exit 1
              ;;
          esac
        fi

        echo "Running $target_count fuzz targets (PARALLEL=$parallel, FUZZTIME=$fuzztime, FUZZ_RACE=$race, GOMAXPROCS=${gomaxprocs:-default}, FUZZ_TEST_PARALLEL=${fuzz_test_parallel:-default})"
        log_dir="$(mktemp -d)"
        trap 'rm -rf "$log_dir"' EXIT

        jq -r '.[] | "\(.target)|\(.package)"' .github/fuzz-targets.json | \
          xargs -P "$parallel" -I{} bash -c '
            entry="$1"
            dir="$2"
            target="${entry%%|*}"
            pkg="${entry#*|}"
            race_args=()
            if [ "${FUZZ_RACE:-1}" != "0" ]; then
              race_args=(-race)
            fi
            parallel_args=()
            if [ -n "${FUZZ_TEST_PARALLEL:-}" ]; then
              parallel_args=(-parallel="${FUZZ_TEST_PARALLEL}")
            fi
            if out=$(go test "${race_args[@]}" "${parallel_args[@]}" -timeout=0 -fuzz="$target" -fuzztime="$FUZZTIME" "$pkg" 2>&1); then
              printf "=== PASS: %s ===\n" "$target" > "$dir/$target.log"
            else
              printf "=== FAIL: %s (%s) ===\n%s\n" "$target" "$pkg" "$out" > "$dir/$target.log"
              : > "$dir/$target.fail"
            fi
          ' _ {} "$log_dir"

        for log in "$log_dir"/*.log; do
          [ -f "$log" ] || continue
          cat "$log"
        done
        if ls "$log_dir"/*.fail >/dev/null 2>&1; then
          exit 1
        fi
        echo "All $target_count fuzz targets passed"
    env:
      FUZZTIME: "{{.FUZZTIME}}"
      PARALLEL: '{{.PARALLEL | default ""}}'
      FUZZ_RACE: '{{.FUZZ_RACE | default "1"}}'
      GOMAXPROCS: '{{.GOMAXPROCS | default ""}}'
      FUZZ_TEST_PARALLEL: '{{.FUZZ_TEST_PARALLEL | default ""}}'
