# Taskfile.yml - cpace validation targets
#
# Local lanes:
#   task quick
#   task check
#   task check:changed
#   task bench
#
# Fuzzing:
#   task fuzz FUZZTIME=30s PARALLEL=2
#   FUZZ_RACE=0 GOMAXPROCS=4 FUZZTIME=8m PARALLEL=2 task fuzz

version: "3"

output: group

vars:
  AST_GREP: '{{.AST_GREP | default "ast-grep"}}'
  CMARK: '{{.CMARK | default "cmark"}}'
  GOSEC: '{{.GOSEC | default "gosec"}}'
  GOFMT: '{{.GOFMT | default "gofmt"}}'
  GOIMPORTS: '{{.GOIMPORTS | default "goimports"}}'
  GOVULNCHECK: '{{.GOVULNCHECK | default "govulncheck"}}'
  STATICCHECK: '{{.STATICCHECK | default "staticcheck"}}'
  FUZZTIME: '{{.FUZZTIME | default "30s"}}'
  BENCH: '{{.BENCH | default "."}}'
  BENCHCOUNT: '{{.BENCHCOUNT | default "1"}}'
  BENCHTIME: '{{.BENCHTIME | default "1s"}}'

tasks:
  default:
    cmds:
      - task: check

  test:
    desc: Run the normal test suite
    cmds:
      - go test ./...

  quick-test:
    desc: Run the lightweight local test lane
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  bench:
    desc: Run benchmarks with allocation metrics
    cmds:
      - go test -run '^$' -bench '{{.BENCH}}' -benchmem -benchtime '{{.BENCHTIME}}' -count '{{.BENCHCOUNT}}' ./...

  lint:
    desc: Run formatting, Go, and structural linters
    cmds:
      - task: lint:gofmt
      - task: lint:goimports
      - task: lint:go
      - task: lint-ast-grep

  lint:gofmt:
    desc: Check gofmt formatting
    cmds:
      - |
        unformatted="$({{.GOFMT}} -l $(git ls-files '*.go'))"
        if [ -n "$unformatted" ]; then
          echo "gofmt check failed. Run gofmt on:"
          echo "$unformatted"
          exit 1
        fi

  lint:goimports:
    desc: Check import formatting
    cmds:
      - |
        command -v {{.GOIMPORTS}} >/dev/null 2>&1 || {
          echo "{{.GOIMPORTS}} not found; install goimports or set GOIMPORTS=/path/to/goimports"
          exit 1
        }
      - |
        unformatted="$({{.GOIMPORTS}} -l $(git ls-files '*.go'))"
        if [ -n "$unformatted" ]; then
          echo "goimports check failed. Run goimports on:"
          echo "$unformatted"
          exit 1
        fi

  lint:go:
    desc: Run Go vet and staticcheck
    cmds:
      - go vet ./...
      - "{{.STATICCHECK}} ./..."

  lint-ast-grep:
    desc: Run ast-grep structural linting rules
    cmds:
      - |
        command -v {{.AST_GREP}} >/dev/null 2>&1 || {
          echo "{{.AST_GREP}} not found; install ast-grep or set AST_GREP=/path/to/ast-grep"
          exit 1
        }
      - "{{.AST_GREP}} scan --error"

  docs:check:
    desc: Validate tracked Markdown and whitespace
    cmds:
      - git diff --check
      - |
        md_files="$(git ls-files '*.md')"
        if [ -z "$md_files" ]; then
          exit 0
        fi
        command -v {{.CMARK}} >/dev/null 2>&1 || {
          echo "{{.CMARK}} not found; install cmark or set CMARK=/path/to/cmark"
          exit 1
        }
        {{.CMARK}} --validate-utf8 $md_files >/dev/null

  vuln:
    desc: Run govulncheck
    cmds:
      - "{{.GOVULNCHECK}} -test ./..."

  gosec:
    desc: Run advisory gosec scan
    cmds:
      - "{{.GOSEC}} ./..."

  release:helpers:
    desc: Run release helper script smoke tests
    cmds:
      - scripts/test-release-helpers.sh

  quick:
    desc: Lightweight local iteration lane
    cmds:
      - task: lint:gofmt
      - task: docs:check
      - task: quick-test

  check:changed:
    desc: Run docs-only validation when only docs changed, otherwise run quick
    cmds:
      - |
        set -euo pipefail
        base="${BASE_REF:-origin/main}"
        changed_files="$(
          {
            if git rev-parse --verify "$base" >/dev/null 2>&1; then
              git diff --name-only "$base"...HEAD
            fi
            git diff --name-only
            git diff --cached --name-only
            git ls-files --others --exclude-standard
          } | sort -u
        )"

        if [ -z "$changed_files" ]; then
          echo "No changed files detected; running quick validation."
          task quick
          exit 0
        fi

        docs_only=true
        while IFS= read -r path; do
          [ -z "$path" ] && continue
          case "$path" in
            *.md|docs/*) ;;
            *)
              docs_only=false
              break
              ;;
          esac
        done <<< "$changed_files"

        if [ "$docs_only" = "true" ]; then
          echo "Docs-only changes detected; running docs validation."
          task docs:check
        else
          echo "Code or workflow changes detected; running quick validation."
          task quick
        fi

  check:
    desc: Full local validation gate
    cmds:
      - task: docs:check
      - task: release:helpers
      - task: test
      - task: test:race
      - task: lint
      - task: vuln

  fuzz:
    desc: Run every fuzz target in .github/fuzz-targets.json
    cmds:
      - |
        set -euo pipefail
        command -v jq >/dev/null 2>&1 || {
          echo "jq not found; install jq to run task fuzz"
          exit 1
        }

        fuzztime="${FUZZTIME}"
        case "$fuzztime" in
          *[smh])
            fuzztime_value="${fuzztime%?}"
            ;;
          *)
            echo "FUZZTIME must be a positive Go duration (got: '$fuzztime')"
            exit 1
            ;;
        esac
        case "$fuzztime_value" in
          ''|*[!0-9]*)
            echo "FUZZTIME must be a positive Go duration (got: '$fuzztime')"
            exit 1
            ;;
        esac
        case "$fuzztime_value" in
          *[1-9]*) ;;
          *)
            echo "FUZZTIME must be a positive Go duration (got: '$fuzztime')"
            exit 1
            ;;
        esac

        parallel="${PARALLEL:-}"
        if [ -z "$parallel" ]; then
          ncores="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)"
          parallel=$(( ncores / 2 ))
          if [ "$parallel" -lt 1 ]; then
            parallel=1
          fi
        fi
        case "$parallel" in
          ''|*[!0-9]*)
            echo "PARALLEL must be a positive integer (got: '$parallel')"
            exit 1
            ;;
        esac
        case "$parallel" in
          *[1-9]*) ;;
          *)
            echo "PARALLEL must be a positive integer (got: '$parallel')"
            exit 1
            ;;
        esac

        target_count="$(jq 'length' .github/fuzz-targets.json)"
        if [ "$target_count" -lt 1 ]; then
          echo ".github/fuzz-targets.json contains no targets"
          exit 1
        fi

        race="${FUZZ_RACE:-1}"
        case "$race" in
          0|1) ;;
          *)
            echo "FUZZ_RACE must be 0 or 1 (got: '$race')"
            exit 1
            ;;
        esac

        echo "Running $target_count fuzz targets (PARALLEL=$parallel, FUZZTIME=$fuzztime, FUZZ_RACE=$race)"
        log_dir="$(mktemp -d)"
        trap 'rm -rf "$log_dir"' EXIT

        jq -r '.[] | "\(.target)|\(.package)"' .github/fuzz-targets.json | \
          xargs -P "$parallel" -I{} bash -c '
            entry="$1"
            dir="$2"
            target="${entry%%|*}"
            pkg="${entry#*|}"
            race_args=()
            if [ "${FUZZ_RACE:-1}" != "0" ]; then
              race_args=(-race)
            fi
            if out=$(go test "${race_args[@]}" -timeout=0 -fuzz="$target" -fuzztime="$FUZZTIME" "$pkg" 2>&1); then
              printf "=== PASS: %s ===\n" "$target" > "$dir/$target.log"
            else
              printf "=== FAIL: %s (%s) ===\n%s\n" "$target" "$pkg" "$out" > "$dir/$target.log"
              : > "$dir/$target.fail"
            fi
          ' _ {} "$log_dir"

        for log in "$log_dir"/*.log; do
          [ -f "$log" ] || continue
          cat "$log"
        done
        if ls "$log_dir"/*.fail >/dev/null 2>&1; then
          exit 1
        fi
        echo "All $target_count fuzz targets passed"
    env:
      FUZZTIME: "{{.FUZZTIME}}"
      FUZZ_RACE: '{{.FUZZ_RACE | default "1"}}'
