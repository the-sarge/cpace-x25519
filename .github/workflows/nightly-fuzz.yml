name: Nightly Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: nightly-fuzz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare fuzz matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.json }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Load fuzz target matrix
        id: matrix
        shell: bash
        run: echo "json=$(jq -c '.' .github/fuzz-targets.json)" >> "$GITHUB_OUTPUT"

  fuzz:
    name: Fuzz (${{ matrix.target }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Snapshot corpus state
        shell: bash
        run: touch "${RUNNER_TEMP}/fuzz-start-${{ matrix.target }}"

      - name: Run fuzz target
        id: fuzz
        continue-on-error: true
        shell: bash
        run: go test -race -fuzz="${{ matrix.target }}" -fuzztime=5m "${{ matrix.package }}"

      - name: Find newly captured corpus files
        id: corpus
        if: steps.fuzz.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          marker="${RUNNER_TEMP}/fuzz-start-${{ matrix.target }}"
          files="$(find . -type f -path "*/testdata/fuzz/${{ matrix.target }}/*" -newer "${marker}" | sort | sed 's#^\./##')"
          if [ -n "$files" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            {
              echo 'files<<EOF'
              echo "$files"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload newly captured corpus files
        if: steps.fuzz.outcome == 'failure' && steps.corpus.outputs.found == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-fuzz-${{ matrix.target }}-corpus
          path: ${{ steps.corpus.outputs.files }}
          retention-days: 14

      - name: Fail job if fuzz step failed
        if: steps.fuzz.outcome == 'failure'
        run: exit 1
