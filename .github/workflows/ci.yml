name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Classify changes
        id: changes
        shell: bash
        run: |
          docs_only=false
          evidence_changed=false

          if [ "${{ github.event_name }}" = "pull_request" ] && git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
            changed_files="$(git diff --name-only --no-renames HEAD^1 HEAD)"
            classification="$(printf '%s\n' "$changed_files" | scripts/classify-check-changes.sh)"
            printf '%s\n' "$classification"
            printf '%s\n' "$classification" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "docs_only=$docs_only"
            echo "evidence_changed=$evidence_changed"
            echo "evidence_checker_changed=false"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.changes.outputs.docs_only != 'true' || steps.changes.outputs.evidence_changed == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate docs-only change
        if: steps.changes.outputs.docs_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git diff --check HEAD^1 HEAD
          python3 - <<'PY'
          import pathlib
          import subprocess

          changed = subprocess.check_output(
              ["git", "diff", "--name-only", "--no-renames", "HEAD^1", "HEAD"],
              text=True,
          ).splitlines()
          for path in changed:
              candidate = pathlib.Path(path)
              if path.endswith(".md") and candidate.exists():
                  candidate.read_text(encoding="utf-8")
          PY

      - name: Report Go environment
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Run tests
        if: steps.changes.outputs.docs_only != 'true'
        run: go test ./...

      - name: Run shell helper smoke tests
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          scripts/test-release-helpers.sh
          scripts/test-ci-classifier.sh

      - name: Run evidence checker lint
        if: steps.changes.outputs.docs_only != 'true'
        working-directory: tools/evidencebaseline
        run: |
          go vet ./...
          go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: Run evidence baseline checker
        if: steps.changes.outputs.docs_only != 'true' || steps.changes.outputs.evidence_changed == 'true'
        run: scripts/check-evidence-baseline.sh
