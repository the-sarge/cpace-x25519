name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Classify changes
        id: changes
        shell: bash
        run: |
          docs_only=false

          if [ "${{ github.event_name }}" = "pull_request" ] && git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^1 HEAD)"
            docs_only=true

            if [ -z "$changed_files" ]; then
              docs_only=false
            else
              while IFS= read -r path; do
                [ -z "$path" ] && continue
                case "$path" in
                  *.md|docs/*) ;;
                  *)
                    docs_only=false
                    break
                    ;;
                esac
              done <<< "$changed_files"
            fi
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Validate docs-only change
        if: steps.changes.outputs.docs_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git diff --check HEAD^1 HEAD
          python3 - <<'PY'
          import pathlib
          import subprocess

          changed = subprocess.check_output(
              ["git", "diff", "--name-only", "HEAD^1", "HEAD"],
              text=True,
          ).splitlines()
          for path in changed:
              if path.endswith(".md"):
                  pathlib.Path(path).read_text(encoding="utf-8")
          PY

      - name: Set up Go
        if: steps.changes.outputs.docs_only != 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Run tests
        if: steps.changes.outputs.docs_only != 'true'
        run: go test ./...
