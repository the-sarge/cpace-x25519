name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: '0 8 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go test ./...
      - run: go test -race ./...
      - run: go test -run '^$' -fuzz=FuzzDecodeMessageA -fuzztime=10s ./...
      - run: go test -run '^$' -fuzz=FuzzDecodeMessageB -fuzztime=10s ./...
      - run: go test -run '^$' -fuzz=FuzzDecodeMessageC -fuzztime=10s ./...
      - run: go test -run '^$' -fuzz=FuzzDraftVectorJSONLoader -fuzztime=10s ./...
      - run: go test -run '^$' -fuzz=FuzzDraftInvalidVectorJSONLoader -fuzztime=10s ./...
      - run: go test -run '^$' -fuzz=FuzzProtocolConsistency -fuzztime=10s ./...
      - run: go test -run '^$' -fuzz=FuzzProtocolMismatch -fuzztime=10s ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: staticcheck ./...

  long-fuzz:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go test -run '^$' -fuzz=FuzzProtocolConsistency -fuzztime=6m ./...
      - run: go test -run '^$' -fuzz=FuzzProtocolMismatch -fuzztime=6m ./...
