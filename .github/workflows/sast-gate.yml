name: SAST Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: sast-gate-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  sast-gate:
    name: SAST Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

      - name: Run gosec
        id: gosec
        continue-on-error: true
        run: gosec -tests -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF to code scanning
        if: always() && hashFiles('gosec.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: gosec.sarif
          category: sast-gate

      - name: Report gosec result
        if: steps.gosec.outcome == 'failure'
        run: exit 1

      - name: Install ast-grep
        env:
          AST_GREP_VERSION: 0.43.0
          AST_GREP_SHA256: a26253a9c821d935f7e383e40f0de7c2ca62a4121de1f73a6d81ec32eae631e0
        run: |
          set -euo pipefail
          asset="app-x86_64-unknown-linux-gnu.zip"
          curl -fsSL -o "${RUNNER_TEMP}/${asset}" \
            "https://github.com/ast-grep/ast-grep/releases/download/${AST_GREP_VERSION}/${asset}"
          echo "${AST_GREP_SHA256}  ${RUNNER_TEMP}/${asset}" | sha256sum -c -
          unzip -j -o "${RUNNER_TEMP}/${asset}" ast-grep -d "${RUNNER_TEMP}"
          chmod +x "${RUNNER_TEMP}/ast-grep"
          sudo mv "${RUNNER_TEMP}/ast-grep" /usr/local/bin/ast-grep
          ast-grep --version

      - name: Run ast-grep structural rules
        run: ast-grep scan --error
