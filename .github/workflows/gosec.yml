name: Gosec Advisory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

permissions:
  contents: read

concurrency:
  group: gosec-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gosec:
    name: Advisory Gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: go install github.com/go-task/task/v3/cmd/task@v3.50.0

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

      - name: Run advisory gosec scan
        id: gosec
        continue-on-error: true
        run: task gosec GOSEC='gosec -fmt sarif -out gosec.sarif'

      - name: Upload gosec SARIF artifact
        if: always() && hashFiles('gosec.sarif') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 14

      - name: Report advisory gosec result
        if: steps.gosec.outcome == 'failure'
        run: exit 1
