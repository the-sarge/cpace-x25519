name: Gosec Advisory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: gosec-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gosec:
    name: Advisory Gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Install task
        run: go install github.com/go-task/task/v3/cmd/task@v3.50.0

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

      - name: Run advisory gosec scan
        id: gosec
        continue-on-error: true
        run: task gosec GOSEC='gosec -fmt sarif -out gosec.sarif'

      - name: Upload gosec SARIF to code scanning
        if: always() && hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: gosec.sarif
          category: gosec

      - name: Report advisory gosec result
        if: steps.gosec.outcome == 'failure'
        run: exit 1
