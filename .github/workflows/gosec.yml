name: Gosec Advisory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: gosec-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gosec:
    name: Advisory Gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Install task
        run: go install github.com/go-task/task/v3/cmd/task@v3.50.0

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

      - name: Run advisory gosec scan
        id: gosec
        continue-on-error: true
        run: task gosec GOSEC='gosec -fmt sarif -out gosec.sarif'

      - name: Upload gosec SARIF to code scanning
        if: always() && hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: gosec.sarif
          category: gosec

      - name: Report advisory gosec result
        if: steps.gosec.outcome == 'failure'
        run: exit 1
