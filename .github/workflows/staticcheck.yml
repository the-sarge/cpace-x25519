name: Staticcheck Advisory

on:
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/staticcheck.yml'
  schedule:
    - cron: '0 9 * * 3'
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: staticcheck-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0

      - name: Run staticcheck
        run: staticcheck ./...
