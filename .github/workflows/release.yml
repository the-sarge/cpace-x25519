name: Release Validation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unsupported-ref:
    name: Unsupported Dispatch Ref
    if: github.event_name == 'workflow_dispatch' && github.ref_type != 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Explain unsupported ref
        run: |
          echo "Release Validation workflow_dispatch runs must target a signed v* tag ref."
          echo "Use the regular CI workflows for branch validation."
          exit 1

  verify-tag:
    name: Verify Signed Tag
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag object and signature
        run: |
          git fetch --force origin "refs/tags/$GITHUB_REF_NAME:refs/tags/$GITHUB_REF_NAME"
          tag_type="$(git cat-file -t "$GITHUB_REF_NAME")"
          printf '%s\n' "$tag_type"
          test "$tag_type" = tag
          git config gpg.ssh.allowedSignersFile .github/allowed_signers
          git verify-tag "$GITHUB_REF_NAME"

  check:
    name: Check
    if: github.ref_type == 'tag'
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Run tests
        run: go test ./...

  race:
    name: Race
    if: github.ref_type == 'tag'
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Run race tests
        run: go test -race ./...

  vuln:
    name: Govulncheck
    if: github.ref_type == 'tag'
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Install task
        run: go install github.com/go-task/task/v3/cmd/task@v3.50.0

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run vulnerability scan
        run: task vuln

  gosec:
    name: Gosec
    if: github.ref_type == 'tag'
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go environment
        run: |
          go version
          go env GOTOOLCHAIN GOPROXY GOSUMDB

      - name: Install task
        run: go install github.com/go-task/task/v3/cmd/task@v3.50.0

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

      - name: Run gosec scan
        id: gosec
        continue-on-error: true
        run: task gosec GOSEC='gosec -fmt sarif -out gosec.sarif'

      - name: Upload gosec SARIF to code scanning
        if: always() && hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: gosec.sarif
          category: gosec-release

      - name: Report gosec result
        if: steps.gosec.outcome == 'failure'
        run: exit 1

  sbom:
    name: SBOM
    if: github.ref_type == 'tag'
    needs:
      - check
      - race
      - vuln
      - gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      sbom-file: ${{ steps.sbom-metadata.outputs.sbom-file }}
      sbom-sha256: ${{ steps.sbom-metadata.outputs.sbom-sha256 }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json@1.5
          output-file: cpace-${{ github.ref_name }}.cdx.json
          syft-version: v1.45.1
          upload-artifact: false
          upload-release-assets: false

      - name: Validate SBOM and compute checksum
        id: sbom-metadata
        run: |
          sbom_file="cpace-${GITHUB_REF_NAME}.cdx.json"
          scripts/validate-cyclonedx-sbom.sh "$sbom_file"
          sbom_sha256="$(sha256sum "$sbom_file" | awk '{ print $1 }')"
          {
            echo "sbom-file=$sbom_file"
            echo "sbom-sha256=$sbom_sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sbom
          path: cpace-${{ github.ref_name }}.cdx.json
          if-no-files-found: error

  sbom-attestation:
    name: SBOM Attestation
    if: github.ref_type == 'tag'
    needs: sbom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-sbom
          path: dist

      - name: Validate downloaded SBOM
        run: |
          scripts/validate-cyclonedx-sbom.sh "dist/$SBOM_FILE"
        env:
          SBOM_FILE: ${{ needs.sbom.outputs.sbom-file }}

      - name: Attest SBOM
        id: attest-sbom
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/${{ needs.sbom.outputs.sbom-file }}
          sbom-path: dist/${{ needs.sbom.outputs.sbom-file }}

      - name: Prepare Sigstore bundle asset
        run: |
          bundle_dst="dist/${SBOM_FILE}.sigstore.json"
          cp "$ATTESTATION_BUNDLE_PATH" "$bundle_dst"
          test -s "$bundle_dst"
        env:
          ATTESTATION_BUNDLE_PATH: ${{ steps.attest-sbom.outputs.bundle-path }}
          SBOM_FILE: ${{ needs.sbom.outputs.sbom-file }}

      - name: Upload release assets artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            dist/${{ needs.sbom.outputs.sbom-file }}
            dist/${{ needs.sbom.outputs.sbom-file }}.sigstore.json
          if-no-files-found: error

  release:
    name: Release
    if: github.ref_type == 'tag'
    needs:
      - sbom
      - sbom-attestation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download prepared release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist

      - name: Prepare release notes and assets
        run: |
          sbom_path="dist/$SBOM_FILE"
          bundle_path="${sbom_path}.sigstore.json"
          test -s "$sbom_path"
          test -s "$bundle_path"
          scripts/validate-cyclonedx-sbom.sh "$sbom_path"

          computed_sha256="$(sha256sum "$sbom_path" | awk '{ print $1 }')"
          test "$computed_sha256" = "$SBOM_SHA256"

          scripts/extract-release-notes.sh CHANGELOG.md "$GITHUB_REF_NAME" > release-notes.md

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            cat release-notes.md
            printf "\n## Supply-chain artifacts\n\n"
            printf -- "- Release validation: %s\n" "$run_url"
            printf -- "- SBOM: \`%s\`\n" "$SBOM_FILE"
            printf -- "- SBOM SHA-256 (corruption detection only): \`%s\`\n" "$computed_sha256"
            printf -- "- SBOM attestation bundle: \`%s.sigstore.json\`\n" "$SBOM_FILE"
            printf -- "- Verification instructions: \`docs/release-verification.md\`\n"
          } > release-body.md

          echo "Prepared release body and assets for $GITHUB_REF_NAME."
        env:
          SBOM_FILE: ${{ needs.sbom.outputs.sbom-file }}
          SBOM_SHA256: ${{ needs.sbom.outputs.sbom-sha256 }}

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="$GITHUB_REF_NAME"
          sbom_path="dist/$SBOM_FILE"
          bundle_path="${sbom_path}.sigstore.json"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes-file release-body.md
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes-file release-body.md --verify-tag
          fi

          gh release upload "$tag" --repo "$GITHUB_REPOSITORY" "$sbom_path" "$bundle_path" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          SBOM_FILE: ${{ needs.sbom.outputs.sbom-file }}
